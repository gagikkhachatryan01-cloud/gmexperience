<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GM Experience | Experiences</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600&family=Inter:wght@300;400&display=swap" rel="stylesheet">

<style>
body { 
margin:0; 
font-family:'Inter',sans-serif; 
background:#0f0f0f; 
color:white; 
}

/* NAVBAR */

nav {
position:fixed;
width:100%;
padding:25px 8%;
display:flex;
justify-content:space-between;
align-items:center;
background:rgba(0,0,0,0.95);
z-index:1000;
box-sizing:border-box;
}

.logo { 
font-family:'Playfair Display',serif; 
letter-spacing:2px; 
}

.nav-links { 
display:flex; 
align-items:center; 
}

nav a { 
margin-left:30px; 
text-decoration:none; 
color:white; 
font-size:14px; 
transition:0.3s;
}

nav a:hover { 
color:#c6a75e; 
}

/* LANGUAGE DROPDOWN */

.language {
position:relative;
margin-left:40px;
cursor:pointer;
font-size:14px;
}

.language span {
display:flex;
align-items:center;
gap:6px;
}

.language span::after {
content:"▼";
font-size:10px;
margin-top:2px;
}

.language-menu {
position:absolute;
top:30px;
right:0;
background:#111;
border-radius:8px;
padding:10px 0;
display:none;
min-width:120px;
box-shadow:0 10px 30px rgba(0,0,0,0.6);
}

.language-menu a {
display:block;
padding:8px 15px;
margin:0;
font-size:13px;
}

.language-menu a:hover {
background:#1c1c1c;
color:#c6a75e;
}

.language:hover .language-menu {
display:block;
}

/* HEADER */

.page-header { 
padding:160px 12% 60px; 
text-align:center; 
}

.page-header h1 { 
font-family:'Playfair Display',serif; 
font-size:48px; 
}

/* SECTION TITLES */

.section-title {
padding:0 12%;
margin:60px 0 30px;
font-family:'Playfair Display',serif;
font-size:28px;
letter-spacing:1px;
}

/* GRID */

.grid {
padding:0 12% 100px;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
gap:30px;
perspective:1000px;
}

/* CARD */

.card {
transition:transform 0.4s ease, box-shadow 0.4s ease;
}

.card img {
width:100%;
height:280px;
object-fit:cover;
border-radius:12px;
transition:transform 0.4s ease;
}

.card:hover {
transform:scale(1.04) translateY(-5px);
box-shadow:0 20px 40px rgba(0,0,0,0.6);
}

.card h3 {
margin-top:15px;
font-family:'Playfair Display',serif;
}

/* MOBILE */

@media(max-width:768px){
.nav-links { display:none; }
}
</style>
</head>

<body>

<nav>
<div class="logo">GM Experience</div>

<div class="nav-links">
<a href="/gmexperience/en/index.html">Home</a>
<a href="/gmexperience/en/experiences.html">Experiences</a>

<a href="/gmexperience/en/contact.html">Contact</a>

<div class="language">
<span>EN</span>
<div class="language-menu">
<a href="#">EN</a>
<a href="#">IT</a>
<a href="#">RU</a>
<a href="#">ARM</a>
</div>
</div>

</div>
</nav>

<section class="page-header">

</section>

<h2 class="section-title">Experiences in Rome</h2>

<section class="grid">

<div class="card">
<img src="../images/roma/colosseo.jpg">
<h3>Colosseum</h3>
</div>

<div class="card">
<img src="../images/roma/fontana_di_trevi.jpg">
<h3>Trevi Fountain</h3>
</div>

<div class="card">
<img src="../images/roma/pantheon.jpg">
<h3>Pantheon</h3>
</div>

<div class="card">
<img src="../images/roma/altare_della_patria.jpg">
<h3>Altare della Patria</h3>
</div>

<div class="card">
<img src="../images/roma/piazza_di_spagna.jpg">

</div>

</section>

<img src="../images/esperienze/villa_d_este/villa1.jpg">

</div>

</body>
</html>
